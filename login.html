<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLESTEP | Login</title>

<style>
:root{
 --bg:#f5f7fb;
 --text:#222;
 --card:#fff;
 --primary:#6366f1;
 --accent:#9333ea;
}
.dark{
 --bg:#0f172a;
 --text:#f1f5f9;
 --card:#1e293b;
}
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:Segoe UI,sans-serif
}
body{
 background:var(--bg);
 color:var(--text);
 min-height:100vh;
 display:flex;
 align-items:center;
 justify-content:center;
 transition:.3s;
}

/* CONTAINER */
.auth-wrapper{
 width:900px;
 max-width:95%;
 background:var(--card);
 border-radius:25px;
 box-shadow:0 30px 80px rgba(0,0,0,.2);
 display:flex;
 overflow:hidden;
}

/* LEFT BRAND PANEL */
.brand-panel{
 flex:1;
 background:linear-gradient(135deg,var(--primary),var(--accent));
 color:#fff;
 padding:50px;
 display:flex;
 flex-direction:column;
 justify-content:center;
}
.brand-panel h1{
 font-size:2.8rem;
}
.brand-panel p{
 margin-top:15px;
 font-size:1.1rem;
 opacity:.9;
}
.brand-panel span{
 margin-top:30px;
 font-size:1rem;
 opacity:.8;
}

/* FORM PANEL */
.form-panel{
 flex:1;
 padding:50px;
 position:relative;
}
.toggle-btn{
 position:absolute;
 top:20px;
 right:20px;
 background:var(--primary);
 color:#fff;
 border:none;
 padding:8px 18px;
 border-radius:20px;
 cursor:pointer;
}

/* FORMS */
form{
 display:none;
 animation:fade .4s ease;
}
form.active{
 display:block;
}
@keyframes fade{
 from{opacity:0;transform:translateY(10px)}
 to{opacity:1;transform:translateY(0)}
}

form h2{
 margin-bottom:10px;
}
form p{
 opacity:.7;
 margin-bottom:25px;
}

input{
 width:100%;
 padding:14px;
 margin:10px 0;
 border-radius:12px;
 border:1px solid #ccc;
 background:transparent;
 color:var(--text);
}

button.submit{
 width:100%;
 background:var(--primary);
 color:#fff;
 border:none;
 padding:14px;
 border-radius:30px;
 margin-top:15px;
 cursor:pointer;
 font-size:1rem;
}

/* SOCIAL */
.social{
 margin-top:25px;
 text-align:center;
}
.social span{
 opacity:.7;
 font-size:.9rem;
}
.social div{
 margin-top:10px;
}
.social button{
 margin:5px;
 padding:10px 18px;
 border-radius:20px;
 border:none;
 cursor:pointer;
 background:#e5e7eb;
}

/* MOBILE */
@media(max-width:750px){
 .auth-wrapper{
  flex-direction:column;
 }
 .brand-panel{
  text-align:center;
 }
}
</style>
</head>

<body>

<div class="auth-wrapper">

<!-- BRAND SIDE -->
<div class="brand-panel">
<h1>SOLESTEP</h1>
<p>Step into style. Walk with confidence.</p>
<span>Premium footwear for every move</span>
</div>

<!-- FORM SIDE -->
<div class="form-panel">

<button class="toggle-btn" onclick="toggleForm()">Register</button>

<!-- LOGIN -->
<form id="loginForm" class="active" onsubmit="loginUser(event)">
<h2>Welcome Back 👟</h2>
<p>Login to your SoleStep account</p>

<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>

<button class="submit" type="submit">Login</button>

<div class="social">
<span>Or login with</span>
<div>
<button type="button">Google</button>
<button type="button">Facebook</button>
</div>
</div>
</form>

<!-- REGISTER -->
<form id="registerForm" onsubmit="registerUser(event)">
<h2>Create Account 🚀</h2>
<p>Join the SoleStep community</p>

<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<input type="password" placeholder="Confirm Password" required>

<button class="submit" type="submit">Register</button>
</form>

</div>
</div>

<script>
let loginForm=document.getElementById("loginForm");
let registerForm=document.getElementById("registerForm");
let btn=document.querySelector(".toggle-btn");

function toggleForm(){
 loginForm.classList.toggle("active");
 registerForm.classList.toggle("active");
 btn.innerText=loginForm.classList.contains("active")?"Register":"Login";
}

/* Fake Login Redirect */
function loginUser(e){
 e.preventDefault();
 window.location.href="index.html";
}

/* Fake Register Redirect */
function registerUser(e){
 e.preventDefault();
 alert("Registration Successful!");
 toggleForm();
}

/* DARK MODE */
if(localStorage.getItem("theme")==="dark"){
 document.body.classList.add("dark");
}
</script>

</body>
</html>
